[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = ".planning/"
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_REPO,GITHUB_OWNER"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
